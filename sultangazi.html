<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, height=1080">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>Sultangazi — 39 · Aksaray / Sultangazi Hattı</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;600;700&family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal: #0e9eb0;
      --teal-dark: #0a8494;
      --teal-deep: #087a88;
      --teal-soft: #d4f0f4;
      --lime: #b5d86a;
      --lime-dark: #9bc44e;
      --bg: #f3f3ee;
      --panel: #ffffff;
      --ink: #2e3338;
      --muted: #8a9098;
      --header-h: 168px;
      --footer-h: 88px;
      --sidebar-w: 500px;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Roboto', system-ui, sans-serif;
      background: #1e2428;
      -webkit-font-smoothing: antialiased;
    }

    .viewport {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .screen {
      width: 1920px;
      height: 1080px;
      flex-shrink: 0;
      transform-origin: center center;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      height: var(--header-h);
      background: var(--panel);
      border-bottom: 1px solid #e2e4e8;
      display: grid;
      grid-template-columns: var(--sidebar-w) 1fr 280px;
      flex-shrink: 0;
    }

    .header-left {
      padding: 18px 22px 14px 28px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      border-right: 1px solid #e8eaee;
    }

    .line-banner {
      display: inline-flex;
      align-self: flex-start;
      background: var(--teal);
      color: #fff;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 10px 22px 10px 18px;
      border-radius: 0 28px 28px 0;
      margin-left: -28px;
      padding-left: 28px;
      box-shadow: 0 2px 8px rgba(14, 158, 176, 0.25);
    }

    .line-row {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .line-circle {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      border: 3px solid #c8ccd2;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Roboto Condensed', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--muted);
      flex-shrink: 0;
      background: #fafafa;
    }

    .line-dest {
      font-size: 2.15rem;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: 0.02em;
      line-height: 1.05;
      text-transform: uppercase;
    }

    .header-mid {
      display: grid;
      grid-template-columns: auto 520px;
      align-items: center;
      gap: 16px;
      padding: 0 16px;
    }

    .status-icons {
      display: flex;
      gap: 24px;
      align-items: flex-end;
    }

    .status-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .status-label {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    .status-ring {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 3px solid var(--lime);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--lime-dark);
      background: #fff;
    }

    .status-ring svg {
      width: 26px;
      height: 26px;
      fill: currentColor;
    }

    .header-logos {
      width: 520px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      height: 100%;
      flex: none;
    }

    .header-logos img {
      display: block;
      object-fit: contain;
      flex: none;
    }

    .logo-ibb-img {
      width: 72px;
      height: 72px;
    }

    .logo-sg-img {
      width: 155px;
      height: 72px;
    }

    .logo-vline {
      width: 2px;
      height: 56px;
      background: #d8dce2;
      margin: 0 14px;
      flex: none;
    }

    .logo-alo {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: 14px;
      flex: none;
    }

    .alo-badge {
      background: linear-gradient(180deg, #1a9fd4 0%, #0d7eb0 100%);
      color: #fff;
      font-weight: 900;
      font-size: 1.1rem;
      padding: 6px 12px;
      border-radius: 6px;
      letter-spacing: 0.04em;
    }

    .alo-text {
      font-size: 0.62rem;
      font-weight: 700;
      color: var(--ink);
      line-height: 1.25;
      letter-spacing: 0.02em;
    }

    .alo-check {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #2ecc71;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      font-weight: 900;
    }

    .header-right {
      padding: 22px 32px 18px 24px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 10px;
      border-left: 1px solid #e8eaee;
    }

    .meta-row {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .meta-row + .meta-row {
      padding-top: 10px;
      border-top: 1px solid #e0e3e8;
    }

    .meta-label {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .meta-value {
      font-size: 1.85rem;
      font-weight: 900;
      color: var(--teal);
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    /* ── Body ── */
    .body {
      flex: 1;
      display: grid;
      grid-template-columns: var(--sidebar-w) 1fr;
      min-height: 0;
    }

    .sidebar {
      background: var(--panel);
      border-right: 1px solid #e2e4e8;
      padding: 12px 14px 12px 10px;
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
      position: relative;
    }

    .stop-timeline {
      list-style: none;
      flex: 1;
      min-height: 0;
      height: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow: hidden;
      padding: 4px 0 36px 0;
    }

    .stop-row {
      display: grid;
      grid-template-columns: 38px 1fr;
      gap: 10px;
      align-items: stretch;
      flex: 1 1 0;
      min-height: 0;
      position: relative;
    }

    .stop-track {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100%;
    }

    .stop-track::before {
      content: '';
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 6px;
      top: 0;
      bottom: 0;
      background: repeating-linear-gradient(
        to bottom,
        var(--lime-dark) 0,
        var(--lime-dark) 12px,
        transparent 12px,
        transparent 22px
      );
      border-radius: 3px;
    }

    .stop-row:first-child .stop-track::before {
      top: 50%;
    }

    .stop-row:last-child .stop-track::before {
      bottom: 50%;
    }

    .stop-row:not(:last-child) .stop-track::after {
      content: '';
      position: absolute;
      left: 50%;
      bottom: -14px;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 11px solid transparent;
      border-right: 11px solid transparent;
      border-top: 14px solid var(--lime-dark);
      z-index: 2;
    }

    .track-dot {
      position: relative;
      z-index: 1;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #fff;
      border: 4px solid var(--lime-dark);
      flex-shrink: 0;
    }

    .stop-row.active .track-dot {
      width: 20px;
      height: 20px;
      background: var(--lime-dark);
      border-color: #88b842;
      box-shadow: 0 0 0 5px rgba(155, 196, 78, 0.25);
    }

    .stop-row.passed .track-dot {
      background: var(--lime);
      border-color: var(--lime-dark);
    }

    .stop-card {
      border-radius: 18px;
      padding: 14px 18px 12px;
      margin: 0;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 0;
      background: transparent;
      border: none;
      position: relative;
      transition: background 0.45s ease, opacity 0.45s ease, box-shadow 0.45s ease;
    }

    .stop-card.alt {
      background: #f4f5f7;
      box-shadow: inset 0 0 0 1px #eceef2;
    }

    .stop-row.active .stop-card {
      background: var(--teal);
      box-shadow: 0 4px 14px rgba(14, 158, 176, 0.22);
    }

    .stop-row.passed .stop-card {
      opacity: 0.38;
    }

    .stop-card .name {
      font-family: 'Roboto Condensed', sans-serif;
      font-size: 1.26rem;
      font-weight: 700;
      color: #2e3338;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      line-height: 1.1;
    }

    .stop-row.active .stop-card .name {
      color: #fff;
      font-size: 1.32rem;
      letter-spacing: 0.05em;
    }

    .stop-row.passed .stop-card .name {
      color: #8a9098;
    }

    .stop-card .eta {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      align-self: flex-start;
      margin-top: 8px;
      font-family: 'Roboto Condensed', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      color: #fff;
      background: var(--teal);
      padding: 4px 14px;
      border-radius: 20px;
      letter-spacing: 0.03em;
    }

    .stop-card .eta-arrow {
      background: var(--teal-deep);
      padding: 4px 16px;
      font-size: 1.1rem;
      line-height: 1;
    }

    .stop-row.passed .stop-card .eta {
      background: #b0b8c0;
    }

    .stop-end-icon {
      position: absolute;
      right: 10px;
      bottom: 10px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #e74c3c;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      font-weight: 700;
      line-height: 1;
    }

    .sidebar-end {
      display: none;
    }

    .main {
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      min-height: 0;
      position: relative;
      overflow: hidden;
    }

    .main-stage {
      width: 100%;
      height: 100%;
      position: relative;
      background: var(--bg);
    }

    .main-name,
    .main-video-wrap {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition:
        opacity 0.55s ease,
        visibility 0.55s ease;
    }

    .main-name.is-visible,
    .main-video-wrap.is-visible {
      opacity: 1;
      visibility: visible;
    }

    .main-name {
      font-family: 'Roboto Condensed', sans-serif;
      font-size: 7.2rem;
      font-weight: 700;
      color: var(--ink);
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      line-height: 1.02;
      max-width: 1300px;
      padding: 40px 60px;
      word-wrap: break-word;
      z-index: 2;
      background: var(--bg);
    }

    .main-video-wrap {
      z-index: 1;
      background: #000;
    }

    .main-video-wrap video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ── Footer ── */
    .footer {
      height: var(--footer-h);
      background: var(--teal);
      display: flex;
      align-items: center;
      flex-shrink: 0;
      overflow: hidden;
      box-shadow: 0 -2px 12px rgba(14, 158, 176, 0.2);
    }

    .footer-announce {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 0 28px 0 32px;
      flex-shrink: 0;
      border-right: 1px solid rgba(255, 255, 255, 0.25);
      height: 100%;
    }

    .megaphone {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .megaphone svg {
      width: 22px;
      height: 22px;
      fill: #fff;
    }

    .announce-label {
      font-size: 1.35rem;
      font-weight: 700;
      color: #fff;
      white-space: nowrap;
      letter-spacing: 0.03em;
    }

    .ticker-wrap {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      height: 100%;
      display: flex;
      align-items: center;
      padding: 0 20px;
    }

    .ticker {
      display: inline-flex;
      width: max-content;
      white-space: nowrap;
      animation: ticker 28s linear infinite;
    }

    .ticker span {
      font-size: 1.2rem;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.92);
      padding-right: 4rem;
      letter-spacing: 0.04em;
    }

    @keyframes ticker {
      from { transform: translateX(0); }
      to { transform: translateX(-50%); }
    }

    .footer-mid {
      padding: 0 36px;
      font-size: 1.35rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.12em;
      flex-shrink: 0;
      border-left: 1px solid rgba(255, 255, 255, 0.25);
      height: 100%;
      display: flex;
      align-items: center;
    }

    .footer-time {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 0;
      height: 100%;
      flex-shrink: 0;
    }

    .time-block {
      padding: 0 36px;
      text-align: center;
      border-left: 2px solid rgba(255, 255, 255, 0.35);
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .time-clock {
      font-size: 2.2rem;
      font-weight: 900;
      color: #fff;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }
  </style>
</head>
<body>
  <div class="viewport" id="viewport">
    <div class="screen" id="screen">
      <header class="header">
        <div class="header-left">
          <div class="line-banner">Aksaray / Sultangazi Hattı</div>
          <div class="line-row">
            <div class="line-circle">39</div>
            <div class="line-dest" id="lineDest">KÜÇÜKKÖY BEŞYOL</div>
          </div>
        </div>

        <div class="header-mid">
          <div class="status-icons" aria-hidden="true">

                <svg viewBox="0 0 24 24"><path d="M17 10.5V7a1 1 0 0 0-1-1H4a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-3.5l4 4v-11l-4 4z"/></svg>

            </div>
            <div class="status-item">

              </div>
            </div>
            <div class="status-item">
              <span class="status-label">Nem</span>
              <div class="status-ring">

          <div class="header-logos">

      </header>

      <div class="body">

        </aside>

        <main class="main" aria-label="Bilgi alanı">
          <div class="main-stage" id="mainStage">

            <div class="main-video-wrap" id="mainVideoWrap" aria-hidden="true">
              <video id="mainVideo" src="galata.mp4" muted playsinline preload="auto"></video>

            <div class="time-clock" id="footerClock">16:41</div>

  </div>

  <script>
    const STOPS = [
      { short: 'DUMLUPINAR ORTA', full: 'DUMLUPINAR ORTAOKULU', offsetMin: 0 },
      { short: 'KÜÇÜKKÖY BEŞYOL', full: 'KÜÇÜKKÖY BEŞYOL', offsetMin: 2 },
      { short: 'YENİ MAHALLE İLKİ', full: 'YENİ MAHALLE İLKÖĞRETİM', offsetMin: 4 },
      { short: 'CEYLAN PARK', full: 'CEYLAN PARK', offsetMin: 6 },
      { short: 'GALERİ CADDESİ', full: 'GALERİ CADDESİ', offsetMin: 8 },
      { short: 'HİRAÇ CAMİİ', full: 'HİRAÇ CAMİİ', offsetMin: 10 },
      { short: '50. YIL MAH.', full: '50. YIL MAHALLESİ', offsetMin: 12 },
      { short: 'SULTANGAZİ MERKEZ', full: 'SULTANGAZİ MERKEZ', offsetMin: 14 },
      { short: 'ESENLER', full: 'ESENLER', offsetMin: 16 },
      { short: 'AKSARAY', full: 'AKSARAY', offsetMin: 18 },
    ];

    const VISIBLE_STOPS = 5;
    const TRAVEL_MS = 3000;
    const FOCUS_MS = 1500;
    const VIDEO_MS = 5500;
    const START_HOUR = 16;
    const START_MINUTE = 41;

    let currentIndex = 0;
    let extraMinutes = 0;
    let phase = 'focus';
    let phaseTimer = null;

    const stopTimelineEl = document.getElementById('stopTimeline');
    const mainNameEl = document.getElementById('mainName');
    const mainVideoWrap = document.getElementById('mainVideoWrap');
    const mainVideo = document.getElementById('mainVideo');
    const footerClockEl = document.getElementById('footerClock');
    const screenEl = document.getElementById('screen');

    function fit() {
      const s = Math.min(window.innerWidth / 1920, window.innerHeight / 1080, 1);
      screenEl.style.transform = `scale(${s})`;
    }

    function formatTime(totalMin) {
      const h = START_HOUR + Math.floor(totalMin / 60);
      const m = totalMin % 60;
      return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
    }

    function renderStops() {
      const windowStart = currentIndex === 0
        ? 0
        : Math.min(currentIndex - 1, Math.max(0, STOPS.length - VISIBLE_STOPS));
      const windowStops = STOPS.slice(windowStart, windowStart + VISIBLE_STOPS);

      stopTimelineEl.innerHTML = windowStops.map((stop, i) => {
        const idx = windowStart + i;
        const isLast = i === windowStops.length - 1;
        let rowCls = 'stop-row';
        if (idx < currentIndex) rowCls += ' passed';
        else if (idx === currentIndex) rowCls += ' active';

        const cardAlt = i > 0 && i % 2 === 0 ? ' alt' : '';
        const isActive = idx === currentIndex;

        let badge = '';
        if (isActive) {
          badge = '<span class="eta eta-arrow" aria-hidden="true">→</span>';
        } else if (idx > currentIndex) {
          badge = `<span class="eta">${idx - currentIndex} dk</span>`;
        }

        const endIcon = isLast
          ? '<span class="stop-end-icon" aria-hidden="true">−</span>'
          : '';

        return `<li class="${rowCls}">
          <div class="stop-track"><span class="track-dot"></span></div>
          <div class="stop-card${cardAlt}">
            <div class="name">${stop.short}</div>
            ${badge}
            ${endIcon}
          </div>
        </li>`;
      }).join('');
    }

    function crossfadeTo(target) {
      const showName = target === 'name';
      mainNameEl.classList.toggle('is-visible', showName);
      mainVideoWrap.classList.toggle('is-visible', !showName);
      mainVideoWrap.setAttribute('aria-hidden', showName ? 'true' : 'false');

      if (showName) {
        mainVideo.pause();
      } else {
        mainVideo.currentTime = 0;
        const playPromise = mainVideo.play();
        if (playPromise && typeof playPromise.catch === 'function') {
          playPromise.catch(() => {});
        }
      }
    }

    function advanceStop() {
      if (currentIndex >= STOPS.length - 1) {
        currentIndex = 0;
        extraMinutes = 0;
      } else {
        currentIndex += 1;
        extraMinutes += 2;
      }
      footerClockEl.textContent = formatTime(START_MINUTE + extraMinutes);
      renderStops();
    }

    function showStopName() {
      mainNameEl.textContent = STOPS[currentIndex].full;
      crossfadeTo('name');
    }

    function showVideo() {
      crossfadeTo('video');
    }

    function showTravel() {
      advanceStop();
      mainNameEl.textContent = STOPS[currentIndex].full;
      crossfadeTo('name');
    }

    function enterPhase(nextPhase) {
      phase = nextPhase;
      if (phase === 'focus') {
        showStopName();
        schedulePhase('video', FOCUS_MS);
      } else if (phase === 'video') {
        showVideo();
        schedulePhase('travel', VIDEO_MS);
      } else if (phase === 'travel') {
        showTravel();
        schedulePhase('video', TRAVEL_MS);
      }
    }

    function schedulePhase(nextPhase, delayMs) {
      if (phaseTimer) clearTimeout(phaseTimer);
      phaseTimer = setTimeout(() => {
        enterPhase(nextPhase);
      }, delayMs);
    }

    function refresh() {
      footerClockEl.textContent = formatTime(START_MINUTE + extraMinutes);
      renderStops();
      mainNameEl.textContent = STOPS[currentIndex].full;
    }

    fit();
    window.addEventListener('resize', fit);
    refresh();
    enterPhase('focus');
    setInterval(() => {
      footerClockEl.textContent = formatTime(START_MINUTE + extraMinutes);
    }, 1000);
  </script>
</body>
</html>
