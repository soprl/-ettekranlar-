<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1280, height=800">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>10.1 — Ana Ekran · 10.1"</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #111; }
    .viewport {
      width: 100vw; height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: #111;
    }
    .screen {
      width: 1280px; height: 800px;
      flex-shrink: 0;
      transform-origin: center center;
      background: #000;
      overflow: hidden;
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.5);
    }
    .screen video {
      width: 100%; height: 100%;
      display: block;
      object-fit: cover;
      background: #000;
    }
    .placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      color: #888;
      font: 600 1.25rem/1.4 system-ui, sans-serif;
      text-align: center;
      padding: 24px;
    }
  </style>
</head>
<body>
  <div class="viewport">
    <div class="screen" id="screen">
      <video id="player" src="10.1-inch.mp4" autoplay muted loop playsinline preload="auto"></video>
      <div class="placeholder" id="placeholder" hidden>10.1-inch.mp4 bekleniyor</div>
    </div>
  </div>
  <script>
    const screen = document.getElementById('screen');
    const player = document.getElementById('player');
    const placeholder = document.getElementById('placeholder');

    function fit() {
      const s = Math.min(window.innerWidth / 1280, window.innerHeight / 800, 1);
      screen.style.transform = `scale(${s})`;
    }

    player.addEventListener('error', () => {
      player.hidden = true;
      placeholder.hidden = false;
    });

    fit();
    window.addEventListener('resize', fit);
  </script>
</body>
</html>
