<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, height=1920">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>Akıllı Durak Ekranı — Dikey Önizleme</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111;
    }

    .viewport {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
    }

    .screen {
      width: 1080px;
      height: 1920px;
      flex-shrink: 0;
      transform-origin: center center;
      background: #000;
      overflow: hidden;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
    }

    .screen img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      object-position: center top;
      background: #fff;
    }
  </style>
</head>
<body>
  <div class="viewport">
    <div class="screen" id="screen">
      <img src="dikey-otobusum-nerde.png" alt="Akıllı durak ekranı — dikey önizleme">
    </div>
  </div>
  <script>
    const screen = document.getElementById('screen');
    function fit() {
      const s = Math.min(window.innerWidth / 1080, window.innerHeight / 1920, 1);
      screen.style.transform = `scale(${s})`;
    }
    fit();
    window.addEventListener('resize', fit);
  </script>
</body>
</html>
