<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, height=214">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>İETT MK12 — Olimpiyatköy Metro · Kayaşehir</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;600;700&family=Roboto:wght@500;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a1a;
      font-family: 'Roboto', system-ui, sans-serif;
    }

    .viewport {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a1a;
    }

    .screen {
      width: 1920px;
      height: 214px;
      flex-shrink: 0;
      transform-origin: center center;
      overflow: hidden;
      position: relative;
    }

    #stage {
      width: 100%;
      height: 100%;
      position: relative;
    }

    .map-layer,
    .focus-layer {
      position: absolute;
      inset: 0;
      transition: opacity 0.7s ease;
    }

    .map-layer { opacity: 1; }
    .map-layer.hidden { opacity: 0; pointer-events: none; }

    .focus-layer {
      opacity: 0;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
    }

    .focus-layer.visible { opacity: 1; }

    #routeCanvas {
      display: block;
      width: 1920px;
      height: 214px;
    }

    .focus-wrap {
      width: 100%;
      padding: 0 40px;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 28px;
    }

    .focus-dot {
      flex-shrink: 0;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #e6a800;
      border: 3px solid #fff;
      box-shadow: 0 0 0 2px #e6a800;
    }

    .focus-dot.is-current {
      width: 28px;
      height: 28px;
      background: #f5c518;
      box-shadow: 0 0 0 3px #e6a800;
    }

    .focus-name {
      font-family: 'Roboto Condensed', sans-serif;
      font-weight: 700;
      color: #111418;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      line-height: 0.9;
      flex: 0 1 auto;
      max-width: calc(100% - 120px);
      transform: scaleX(1.04);
      transform-origin: center center;
    }

    .focus-name.size-md { letter-spacing: 0.05em; }
    .focus-name.size-sm { letter-spacing: 0.04em; line-height: 0.95; }
  </style>
</head>
<body>
  <div class="viewport" id="viewport">
    <div class="screen" id="screen">
      <div id="stage">
        <div class="map-layer" id="mapLayer">
          <canvas id="routeCanvas" width="1920" height="214"></canvas>
        </div>
        <div class="focus-layer" id="focusLayer" aria-hidden="true">
          <div class="focus-wrap">
            <span class="focus-dot is-current" aria-hidden="true"></span>
            <p class="focus-name" id="focusName">—</p>
            <span class="focus-dot is-current" aria-hidden="true"></span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const SCREEN_W = 1920;
    const W = 1920;
    const H = 214;
    const BORDER = 10;

    const YELLOW = '#f5c518';
    const YELLOW_DARK = '#e6a800';
    const YELLOW_DEEP = '#c99200';
    const YELLOW_LIGHT = '#ffe566';
    const LINE_BG = '#e8eaed';
    const DOT_FUTURE = '#d4d4d4';

    /* MK12 — 20 ana durak (Olimpiyatköy Metro → Kayaşehir) */
    const STOPS = [
      'Olimpiyatköy',
      'Kuzey Girişi',
      'İSKİ',
      'Peyami Safa',
      'Tepe İlk.',
      'Bayramtepe',
      'Güvercintepe',
      'Pazar Yolu',
      'M.Ş.Zırh',
      'Kurutoprak',
      'Son Evler',
      'Kayabaşı',
      'Kayaşehir',
      'Elmas',
      'Merkez',
      'Opal',
      'Yakut',
      'Sağlık Ocağı',
      'Nidapark',
      'ERPA TEKNOLOJİ',
    ];

    const TRAVEL_MS = 2800;
    const ARRIVE_MS = 600;
    const FOCUS_MS = 1000;
    const FADE_MS = 750;

    const canvas = document.getElementById('routeCanvas');
    const ctx = canvas.getContext('2d');
    const mapLayer = document.getElementById('mapLayer');
    const focusLayer = document.getElementById('focusLayer');
    const focusNameEl = document.getElementById('focusName');
    const screenEl = document.getElementById('screen');

    const play = {
      x: BORDER,
      y: BORDER,
      w: W - BORDER * 2,
      h: H - BORDER * 2,
    };

    const route = {
      x0: play.x + 64,
      x1: play.x + play.w - 64,
    };

    const stopSpacing = () => (route.x1 - route.x0) / (STOPS.length - 1);

    let busImg = null;
    let currentIndex = 0;
    let segmentT = 0;
    let phase = 'focus';
    let phaseUntil = 0;

    function routeY() {
      return play.y + play.h * 0.54;
    }

    function stopX(i) {
      const n = STOPS.length - 1;
      return route.x0 + (route.x1 - route.x0) * (i / n);
    }

    function easeOutCubic(t) {
      return 1 - Math.pow(1 - t, 3);
    }

    function upper(name) {
      return name.toLocaleUpperCase('tr-TR');
    }

    function wrapStopLines(name, maxWidth, isCurrent, maxLines = 2) {
      const full = upper(name);
      let fontSize = isCurrent ? 15 : 12;
      const minFont = 9;

      function buildLines(size) {
        ctx.font = `${isCurrent ? 700 : 600} ${size}px "Roboto Condensed", sans-serif`;
        const words = full.split(' ');
        const lines = [];
        let current = '';

        for (let w = 0; w < words.length; w++) {
          const word = words[w];
          const test = current ? `${current} ${word}` : word;
          if (ctx.measureText(test).width <= maxWidth) {
            current = test;
            continue;
          }
          if (current) lines.push(current);
          if (lines.length >= maxLines - 1) {
            lines.push(words.slice(w).join(' '));
            return lines.slice(0, maxLines);
          }
          current = word;
        }
        if (current) lines.push(current);
        return lines.slice(0, maxLines);
      }

      while (fontSize >= minFont) {
        ctx.font = `${isCurrent ? 700 : 600} ${fontSize}px "Roboto Condensed", sans-serif`;
        const lines = buildLines(fontSize);
        const fits = lines.every((line) => ctx.measureText(line).width <= maxWidth);
        if (fits) return { lines, fontSize };
        fontSize -= 1;
      }

      ctx.font = `${isCurrent ? 700 : 600} ${minFont}px "Roboto Condensed", sans-serif`;
      const lines = buildLines(minFont);
      if (lines.every((line) => ctx.measureText(line).width <= maxWidth)) {
        return { lines, fontSize: minFont };
      }

      const chars = full.split('');
      const split = [];
      let chunk = '';
      for (const ch of chars) {
        const test = chunk + ch;
        if (ctx.measureText(test).width <= maxWidth) chunk = test;
        else {
          if (chunk) split.push(chunk);
          chunk = ch;
        }
      }
      if (chunk) split.push(chunk);
      return { lines: split.slice(0, maxLines), fontSize: minFont };
    }

    function drawStopLabel(name, x, ry, isCurrent, index) {
      const maxWidth = stopSpacing() * 0.98;
      const { lines, fontSize } = wrapStopLines(name, maxWidth, isCurrent);
      const lineHeight = fontSize + 2;
      const above = index % 2 === 0;
      const blockHeight = lines.length * lineHeight;
      const anchorY = above
        ? ry - 18 - blockHeight
        : ry + 30;

      ctx.save();
      ctx.fillStyle = isCurrent ? '#111418' : '#5c6570';
      ctx.font = `${isCurrent ? 700 : 600} ${fontSize}px "Roboto Condensed", sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      lines.forEach((line, i) => {
        ctx.fillText(line, x, anchorY + i * lineHeight);
      });
      ctx.restore();
    }

    function fitFocusName(name) {
      focusNameEl.textContent = upper(name);
      focusNameEl.className = 'focus-name';
      const len = name.length;
      if (len > 28) {
        focusNameEl.classList.add('size-sm');
        focusNameEl.style.fontSize = '72px';
      } else if (len > 18) {
        focusNameEl.classList.add('size-md');
        focusNameEl.style.fontSize = '96px';
      } else {
        focusNameEl.style.fontSize = '128px';
      }
    }

    function drawBorder() {
      ctx.fillStyle = YELLOW_DARK;
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = YELLOW;
      ctx.fillRect(BORDER / 2, BORDER / 2, W - BORDER, H - BORDER);
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(play.x, play.y, play.w, play.h);
    }

    function drawHeader() {
      const y = play.y + 26;
      ctx.fillStyle = '#111418';
      ctx.font = '700 22px "Roboto Condensed", sans-serif';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'alphabetic';
      ctx.fillText('İETT', play.x + 18, y);
      ctx.fillStyle = YELLOW_DEEP;
      ctx.fillText('MK12', play.x + 72, y);
      ctx.fillStyle = '#5c6570';
      ctx.font = '700 26px "Roboto Condensed", sans-serif';
      ctx.fillText('Olimpiyatköy Metro → Kayaşehir', play.x + 138, y);
      ctx.textAlign = 'right';
      ctx.fillStyle = YELLOW_DARK;
      ctx.font = '700 24px "Roboto Condensed", sans-serif';
      ctx.fillText('MK12', play.x + play.w - 18, y);
    }

    function drawRoute(upToIndex, busProgress) {
      const ry = routeY();
      const endIdx = Math.min(upToIndex, STOPS.length - 1);
      const busIdx = Math.min(upToIndex, STOPS.length - 2);
      const t = Math.min(1, Math.max(0, busProgress));
      const busX =
        stopX(busIdx) + (stopX(busIdx + 1) - stopX(busIdx)) * easeOutCubic(t);

      ctx.strokeStyle = LINE_BG;
      ctx.lineWidth = 6;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(route.x0, ry);
      ctx.lineTo(route.x1, ry);
      ctx.stroke();

      const activeEndX =
        t > 0 && upToIndex < STOPS.length - 1 ? busX : stopX(endIdx);
      const grad = ctx.createLinearGradient(route.x0, ry, activeEndX, ry);
      grad.addColorStop(0, YELLOW_LIGHT);
      grad.addColorStop(1, YELLOW_DARK);
      ctx.strokeStyle = grad;
      ctx.lineWidth = 8;
      ctx.beginPath();
      ctx.moveTo(route.x0, ry);
      ctx.lineTo(activeEndX, ry);
      ctx.stroke();

      STOPS.forEach((name, i) => {
        const x = stopX(i);
        const passed = i <= endIdx;
        const isCurrent = i === endIdx;
        const r = isCurrent ? 12 : passed ? 9 : 6;

        if (passed) {
          drawStopLabel(name, x, ry, isCurrent, i);
        }

        ctx.beginPath();
        ctx.arc(x, ry, r, 0, Math.PI * 2);
        ctx.fillStyle = passed ? YELLOW_DARK : DOT_FUTURE;
        ctx.fill();
        if (passed) {
          ctx.strokeStyle = '#fff';
          ctx.lineWidth = 2;
          ctx.stroke();
        }
      });

      const busTop = ry + 10;
      if (busImg && busImg.complete) {
        const sz = 34;
        ctx.save();
        ctx.filter =
          'brightness(0) saturate(100%) invert(72%) sepia(85%) saturate(600%) hue-rotate(5deg) brightness(0.95)';
        ctx.drawImage(busImg, busX - sz / 2, busTop, sz, sz);
        ctx.restore();
      } else {
        ctx.fillStyle = YELLOW_DEEP;
        ctx.beginPath();
        ctx.arc(busX, busTop + 16, 13, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawMap(upToIndex, busProgress) {
      drawBorder();
      drawHeader();
      drawRoute(upToIndex, busProgress);
    }

    function showFocus(name) {
      fitFocusName(name);
      mapLayer.classList.add('hidden');
      focusLayer.classList.add('visible');
      focusLayer.setAttribute('aria-hidden', 'false');
    }

    function showMap() {
      focusLayer.classList.remove('visible');
      focusLayer.setAttribute('aria-hidden', 'true');
      mapLayer.classList.remove('hidden');
    }

    function setPhase(next, until) {
      phase = next;
      phaseUntil = until;
    }

    function beginTravel(now) {
      segmentT = 0;
      setPhase('travel', now + TRAVEL_MS);
    }

    function runFrame(now) {
      if (phase === 'travel') {
        segmentT = Math.min(1, 1 - (phaseUntil - now) / TRAVEL_MS);
        drawMap(currentIndex, segmentT);
        if (now >= phaseUntil) {
          currentIndex += 1;
          segmentT = 0;
          setPhase('arrive', now + ARRIVE_MS);
        }
      } else if (phase === 'arrive') {
        drawMap(currentIndex, 0);
        if (now >= phaseUntil) {
          setPhase('focus', now + FOCUS_MS);
          showFocus(STOPS[currentIndex]);
        }
      } else if (phase === 'focus') {
        if (now >= phaseUntil) {
          showMap();
          if (currentIndex >= STOPS.length - 1) {
            currentIndex = 0;
            setPhase('focus', now + FOCUS_MS);
            showFocus(STOPS[0]);
          } else {
            beginTravel(now + FADE_MS);
          }
        }
      }
      requestAnimationFrame(runFrame);
    }

    function startLoop() {
      currentIndex = 0;
      showFocus(STOPS[0]);
      setPhase('focus', performance.now() + FOCUS_MS);
      requestAnimationFrame(runFrame);
    }

    function fitViewport() {
      const scale = Math.min(
        window.innerWidth / SCREEN_W,
        window.innerHeight / H,
        1
      );
      screenEl.style.transform = `scale(${scale})`;
    }

    busImg = new Image();
    busImg.src = 'front-of-bus.png';

    drawMap(0, 0);
    fitViewport();
    window.addEventListener('resize', fitViewport);
    startLoop();
  </script>
</body>
</html>
