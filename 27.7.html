<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, height=198">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>İETT 30M — 27.7</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;600;700&family=Roboto:wght@500;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0c1624;
      font-family: 'Roboto', system-ui, sans-serif;
    }

    .viewport {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0c1624;
    }

    .screen {
      width: 1920px;
      height: 198px;
      flex-shrink: 0;
      transform-origin: center center;
      display: flex;
      flex-direction: row;
      overflow: hidden;
    }

    /* Sol 1 — hava (toplam 4:1 → sağ 4 birim, sol 1 birim) */
    .weather-panel {
      width: 384px;
      height: 198px;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }

    #weatherCanvas {
      display: block;
      width: 384px;
      height: 198px;
    }

    /* Sağ 4 — hat */
    .route-panel {
      width: 1536px;
      height: 198px;
      flex-shrink: 0;
      position: relative;
    }

    #stage {
      width: 100%;
      height: 100%;
      position: relative;
    }

    .map-layer,
    .focus-layer {
      position: absolute;
      inset: 0;
      transition: opacity 0.7s ease;
    }

    .map-layer { opacity: 1; }
    .map-layer.hidden { opacity: 0; pointer-events: none; }

    .focus-layer {
      opacity: 0;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
    }

    .focus-layer.visible { opacity: 1; }

    #routeCanvas {
      display: block;
      width: 1536px;
      height: 198px;
    }

    .focus-wrap {
      width: 100%;
      padding: 0 36px;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 22px;
    }

    .focus-dot {
      flex-shrink: 0;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #1e5a8a;
      border: 3px solid #fff;
      box-shadow: 0 0 0 2px #2563eb;
    }

    .focus-dot.is-current {
      width: 26px;
      height: 26px;
      background: #3b82f6;
      box-shadow: 0 0 0 3px #1e5a8a;
    }

    .focus-name {
      font-family: 'Roboto Condensed', sans-serif;
      font-weight: 700;
      color: #111418;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      line-height: 0.9;
      flex: 0 1 auto;
      max-width: calc(100% - 100px);
      transform: scaleX(1.04);
      transform-origin: center center;
    }

    .focus-name.size-md { letter-spacing: 0.05em; }
    .focus-name.size-sm { letter-spacing: 0.04em; line-height: 0.95; }
  </style>
</head>
<body>
  <div class="viewport" id="viewport">
    <div class="screen" id="screen">
      <aside class="weather-panel" aria-label="Hava durumu">
        <canvas id="weatherCanvas" width="384" height="198"></canvas>
      </aside>

      <div class="route-panel">
        <div id="stage">
          <div class="map-layer" id="mapLayer">
            <canvas id="routeCanvas" width="1536" height="198"></canvas>
          </div>
          <div class="focus-layer" id="focusLayer" aria-hidden="true">
            <div class="focus-wrap">
              <span class="focus-dot is-current" aria-hidden="true"></span>
              <p class="focus-name" id="focusName">—</p>
              <span class="focus-dot is-current" aria-hidden="true"></span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const SCREEN_W = 1920;
    const SCREEN_H = 198;
    const WEATHER_W = 384;
    const ROUTE_W = 1536;
    const H = 198;
    const BORDER = 8;

    const BLUE = '#1e5a8a';
    const BLUE_LIGHT = '#2563eb';
    const BLUE_BRIGHT = '#3b82f6';
    const BLUE_SKY = '#60a5fa';
    const BLUE_PALE = '#93c5fd';
    const LINE_BG = '#e8eaed';
    const DOT_FUTURE = '#d4d4d4';

    /* 30M — Beşiktaş Peronlar ring, 10 durak */
    const STOPS = [
      'Beşiktaş',
      'Akaretler',
      'Valideçeşme',
      'Maçka',
      'Nişantaşı',
      'Osmanbey',
      'Şişli',
      'Mecidiyeköy',
      'Yıldız',
      'Barbaros',
    ];

    const TRAVEL_MS = 2400;
    const ARRIVE_MS = 550;
    const FOCUS_MS = 1000;
    const FADE_MS = 700;

    const weatherCanvas = document.getElementById('weatherCanvas');
    const wctx = weatherCanvas.getContext('2d');
    const canvas = document.getElementById('routeCanvas');
    const ctx = canvas.getContext('2d');
    const mapLayer = document.getElementById('mapLayer');
    const focusLayer = document.getElementById('focusLayer');
    const focusNameEl = document.getElementById('focusName');
    const screenEl = document.getElementById('screen');

    const play = {
      x: BORDER,
      y: BORDER,
      w: ROUTE_W - BORDER * 2,
      h: H - BORDER * 2,
    };

    const routePad = { left: 78, right: 108 };
    const route = {
      x0: play.x + routePad.left,
      x1: play.x + play.w - routePad.right,
    };

    let busImg = null;
    let currentIndex = 0;
    let segmentT = 0;
    let phase = 'focus';
    let phaseUntil = 0;

    let weather = {
      temp: 18,
      label: 'Parçalı bulutlu',
      code: 2,
      isDay: true,
    };

    const clouds = Array.from({ length: 5 }, (_, i) => ({
      x: i * 90 - 20,
      y: 38 + (i % 3) * 18,
      w: 52 + (i % 2) * 18,
      speed: 0.12 + i * 0.04,
    }));

    const rainDrops = Array.from({ length: 40 }, () => ({
      x: Math.random() * WEATHER_W,
      y: Math.random() * 198,
      len: 8 + Math.random() * 10,
      speed: 4 + Math.random() * 5,
    }));

    function stopX(i) {
      const n = STOPS.length - 1;
      return route.x0 + (route.x1 - route.x0) * (i / n);
    }

    function stopSpacing() {
      return (route.x1 - route.x0) / (STOPS.length - 1);
    }

    function routeY() {
      return play.y + play.h * 0.56;
    }

    function easeOutCubic(t) {
      return 1 - Math.pow(1 - t, 3);
    }

    function upper(name) {
      return name.toLocaleUpperCase('tr-TR');
    }

    function wmoLabel(code) {
      if (code === 0) return 'Açık';
      if (code <= 3) return 'Parçalı bulutlu';
      if (code <= 48) return 'Sisli';
      if (code <= 57) return 'Çisenti';
      if (code <= 67) return 'Yağmurlu';
      if (code <= 77) return 'Karlı';
      if (code <= 82) return 'Sağanak';
      if (code <= 86) return 'Kar sağanağı';
      return 'Fırtınalı';
    }

    async function fetchWeather() {
      try {
        const url =
          'https://api.open-meteo.com/v1/forecast?latitude=41.01&longitude=28.98&current=temperature_2m,weather_code,is_day&timezone=Europe%2FIstanbul';
        const res = await fetch(url);
        const data = await res.json();
        const c = data.current;
        weather.temp = Math.round(c.temperature_2m);
        weather.code = c.weather_code;
        weather.isDay = c.is_day === 1;
        weather.label = wmoLabel(c.weather_code);
      } catch (_) {}
    }

    function drawWeatherScene(t) {
      const w = WEATHER_W;
      const h = H;
      const rainy = weather.code >= 51 && weather.code <= 82;
      const cloudy = weather.code > 0 && weather.code <= 3;
      const clear = weather.code === 0;

      const sky = wctx.createLinearGradient(0, 0, 0, h);
      if (!weather.isDay) {
        sky.addColorStop(0, '#0f2744');
        sky.addColorStop(1, '#1e3a5f');
      } else if (rainy) {
        sky.addColorStop(0, '#5b7a9a');
        sky.addColorStop(1, '#8aa4be');
      } else if (clear) {
        sky.addColorStop(0, '#1e6bb8');
        sky.addColorStop(1, '#60a5fa');
      } else {
        sky.addColorStop(0, '#2b6cb8');
        sky.addColorStop(1, '#7eb8f7');
      }
      wctx.fillStyle = sky;
      wctx.fillRect(0, 0, w, h);

      wctx.fillStyle = 'rgba(255,255,255,0.08)';
      wctx.fillRect(0, h - 36, w, 36);

      clouds.forEach((c) => {
        const x = ((c.x + t * c.speed * 60) % (w + c.w)) - c.w;
        wctx.fillStyle = 'rgba(255,255,255,0.75)';
        wctx.beginPath();
        wctx.ellipse(x + c.w * 0.35, c.y, c.w * 0.35, 14, 0, 0, Math.PI * 2);
        wctx.ellipse(x + c.w * 0.6, c.y + 4, c.w * 0.4, 16, 0, 0, Math.PI * 2);
        wctx.ellipse(x + c.w * 0.2, c.y + 6, c.w * 0.28, 12, 0, 0, Math.PI * 2);
        wctx.fill();
      });

      if (weather.isDay && (clear || cloudy)) {
        const pulse = 0.92 + Math.sin(t * 2) * 0.06;
        const sx = w - 72;
        const sy = 42;
        wctx.save();
        wctx.translate(sx, sy);
        wctx.scale(pulse, pulse);
        const sunG = wctx.createRadialGradient(0, 0, 4, 0, 0, 28);
        sunG.addColorStop(0, '#fff9c4');
        sunG.addColorStop(0.5, '#fde047');
        sunG.addColorStop(1, 'rgba(253,224,71,0)');
        wctx.fillStyle = sunG;
        wctx.beginPath();
        wctx.arc(0, 0, 28, 0, Math.PI * 2);
        wctx.fill();
        wctx.fillStyle = '#fbbf24';
        wctx.beginPath();
        wctx.arc(0, 0, 14, 0, Math.PI * 2);
        wctx.fill();
        wctx.restore();
      }

      if (rainy || weather.code >= 95) {
        wctx.strokeStyle = 'rgba(174,214,241,0.7)';
        wctx.lineWidth = 1.5;
        rainDrops.forEach((d) => {
          const y = (d.y + t * d.speed * 30) % (h + 20);
          wctx.beginPath();
          wctx.moveTo(d.x, y);
          wctx.lineTo(d.x - 2, y + d.len);
          wctx.stroke();
        });
      }

      wctx.fillStyle = '#ffffff';
      wctx.font = '700 56px Roboto Condensed, sans-serif';
      wctx.textAlign = 'left';
      wctx.textBaseline = 'alphabetic';
      wctx.fillText(`${weather.temp}°`, 12, h - 56);

      wctx.font = '600 17px Roboto, sans-serif';
      wctx.fillStyle = 'rgba(255,255,255,0.95)';
      wctx.fillText(weather.label, 12, h - 24);

      wctx.font = '700 15px Roboto Condensed, sans-serif';
      wctx.fillStyle = 'rgba(255,255,255,0.75)';
      wctx.fillText('İSTANBUL', 12, 30);

      wctx.textAlign = 'right';
      wctx.font = '700 14px Roboto Condensed, sans-serif';
      wctx.fillStyle = 'rgba(255,255,255,0.8)';
      wctx.fillText('CANLI', w - 12, 30);
    }

    let weatherT0 = performance.now();
    function weatherLoop(now) {
      const t = (now - weatherT0) / 1000;
      drawWeatherScene(t);
      requestAnimationFrame(weatherLoop);
    }

    function labelForStop(name, isCurrent) {
      const space = stopSpacing();
      const maxPx = space * 0.9;
      const full = upper(name);
      ctx.font = isCurrent
        ? '700 16px "Roboto Condensed", sans-serif'
        : '600 13px "Roboto Condensed", sans-serif';
      if (ctx.measureText(full).width <= maxPx) return full;
      let t = full;
      while (t.length > 3 && ctx.measureText(t + '…').width > maxPx) {
        t = t.slice(0, -1);
      }
      return t + '…';
    }

    function fitFocusName(name) {
      focusNameEl.textContent = upper(name);
      focusNameEl.className = 'focus-name';
      const len = name.length;
      if (len > 24) {
        focusNameEl.classList.add('size-sm');
        focusNameEl.style.fontSize = '58px';
      } else if (len > 14) {
        focusNameEl.classList.add('size-md');
        focusNameEl.style.fontSize = '78px';
      } else {
        focusNameEl.style.fontSize = '104px';
      }
    }

    function drawBorder() {
      ctx.fillStyle = BLUE;
      ctx.fillRect(0, 0, ROUTE_W, H);
      ctx.fillStyle = BLUE_LIGHT;
      ctx.fillRect(BORDER / 2, BORDER / 2, ROUTE_W - BORDER, H - BORDER);
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(play.x, play.y, play.w, play.h);
    }

    function drawHeader() {
      const y = play.y + 24;
      ctx.fillStyle = '#111418';
      ctx.font = '700 20px "Roboto Condensed", sans-serif';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'alphabetic';
      ctx.fillText('İETT', play.x + 16, y);
      ctx.fillStyle = BLUE;
      ctx.fillText('30M', play.x + 64, y);
      ctx.fillStyle = '#5c6570';
      ctx.font = '700 26px "Roboto Condensed", sans-serif';
      ctx.fillText('Beşiktaş → Mecidiyeköy', play.x + 118, y);
      ctx.textAlign = 'right';
      ctx.fillStyle = BLUE_LIGHT;
      ctx.font = '700 22px "Roboto Condensed", sans-serif';
      ctx.fillText('30M', play.x + play.w - 20, y);
    }

    function drawStopLabel(name, x, ry, isCurrent) {
      const label = labelForStop(name, isCurrent);
      ctx.save();
      ctx.translate(x, ry - 40);
      ctx.rotate(-0.52);
      ctx.fillStyle = isCurrent ? '#111418' : '#5c6570';
      ctx.font = isCurrent
        ? '700 16px "Roboto Condensed", sans-serif'
        : '600 13px "Roboto Condensed", sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(label, 0, 0);
      ctx.restore();
    }

    function drawRoute(upToIndex, busProgress) {
      ctx.save();
      ctx.beginPath();
      ctx.rect(play.x + 2, play.y + 30, play.w - 4, play.h - 34);
      ctx.clip();

      const ry = routeY();
      const endIdx = Math.min(upToIndex, STOPS.length - 1);
      const busIdx = Math.min(upToIndex, STOPS.length - 2);
      const t = Math.min(1, Math.max(0, busProgress));
      const busX =
        stopX(busIdx) + (stopX(busIdx + 1) - stopX(busIdx)) * easeOutCubic(t);

      ctx.strokeStyle = LINE_BG;
      ctx.lineWidth = 5;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(route.x0, ry);
      ctx.lineTo(route.x1, ry);
      ctx.stroke();

      const activeEndX =
        t > 0 && upToIndex < STOPS.length - 1 ? busX : stopX(endIdx);
      const grad = ctx.createLinearGradient(route.x0, ry, activeEndX, ry);
      grad.addColorStop(0, BLUE_PALE);
      grad.addColorStop(1, BLUE);
      ctx.strokeStyle = grad;
      ctx.lineWidth = 7;
      ctx.beginPath();
      ctx.moveTo(route.x0, ry);
      ctx.lineTo(activeEndX, ry);
      ctx.stroke();

      STOPS.forEach((name, i) => {
        const x = stopX(i);
        const passed = i <= endIdx;
        const isCurrent = i === endIdx;
        const r = isCurrent ? 11 : passed ? 8 : 5;

        if (passed) drawStopLabel(name, x, ry, isCurrent);

        ctx.beginPath();
        ctx.arc(x, ry, r, 0, Math.PI * 2);
        ctx.fillStyle = passed ? BLUE_LIGHT : DOT_FUTURE;
        ctx.fill();
        if (passed) {
          ctx.strokeStyle = '#fff';
          ctx.lineWidth = 2;
          ctx.stroke();
        }
      });

      const busTop = ry + 8;
      if (busImg && busImg.complete) {
        const sz = 30;
        ctx.save();
        ctx.filter =
          'brightness(0) saturate(100%) invert(28%) sepia(90%) saturate(1200%) hue-rotate(185deg) brightness(0.95)';
        ctx.drawImage(busImg, busX - sz / 2, busTop, sz, sz);
        ctx.restore();
      } else {
        ctx.fillStyle = BLUE;
        ctx.beginPath();
        ctx.arc(busX, busTop + 14, 12, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.restore();
    }

    function drawMap(upToIndex, busProgress) {
      drawBorder();
      drawHeader();
      drawRoute(upToIndex, busProgress);
    }

    function showFocus(name) {
      fitFocusName(name);
      mapLayer.classList.add('hidden');
      focusLayer.classList.add('visible');
      focusLayer.setAttribute('aria-hidden', 'false');
    }

    function showMap() {
      focusLayer.classList.remove('visible');
      focusLayer.setAttribute('aria-hidden', 'true');
      mapLayer.classList.remove('hidden');
    }

    function setPhase(next, until) {
      phase = next;
      phaseUntil = until;
    }

    function beginTravel(now) {
      segmentT = 0;
      setPhase('travel', now + TRAVEL_MS);
    }

    function runFrame(now) {
      if (phase === 'travel') {
        segmentT = Math.min(1, 1 - (phaseUntil - now) / TRAVEL_MS);
        drawMap(currentIndex, segmentT);
        if (now >= phaseUntil) {
          currentIndex += 1;
          segmentT = 0;
          setPhase('arrive', now + ARRIVE_MS);
        }
      } else if (phase === 'arrive') {
        drawMap(currentIndex, 0);
        if (now >= phaseUntil) {
          setPhase('focus', now + FOCUS_MS);
          showFocus(STOPS[currentIndex]);
        }
      } else if (phase === 'focus') {
        if (now >= phaseUntil) {
          showMap();
          if (currentIndex >= STOPS.length - 1) {
            currentIndex = 0;
            setPhase('focus', now + FOCUS_MS);
            showFocus(STOPS[0]);
          } else {
            beginTravel(now + FADE_MS);
          }
        }
      }
      requestAnimationFrame(runFrame);
    }

    function startLoop() {
      currentIndex = 0;
      showFocus(STOPS[0]);
      setPhase('focus', performance.now() + FOCUS_MS);
      requestAnimationFrame(runFrame);
    }

    function fitViewport() {
      const scale = Math.min(
        window.innerWidth / SCREEN_W,
        window.innerHeight / SCREEN_H,
        1
      );
      screenEl.style.transform = `scale(${scale})`;
    }

    busImg = new Image();
    busImg.src = 'front-of-bus.png';

    fetchWeather();
    setInterval(fetchWeather, 10 * 60 * 1000);
    requestAnimationFrame(weatherLoop);

    drawMap(0, 0);
    fitViewport();
    window.addEventListener('resize', fitViewport);
    startLoop();
  </script>
</body>
</html>
