<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, height=1920">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>İBB Akıllı Durak — Siyah Beyaz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;600;700;900&family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #000000;
      --white: #ffffff;
      --header-h: 300px;
      --footer-h: 360px;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Roboto', system-ui, sans-serif;
      background: #111;
      -webkit-font-smoothing: antialiased;
    }

    .viewport {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
    }

    .screen {
      width: 1080px;
      height: 1920px;
      flex-shrink: 0;
      transform-origin: center center;
      display: flex;
      flex-direction: column;
      background: var(--white);
      overflow: hidden;
      color: var(--black);
      font-family: 'Roboto Condensed', 'Roboto', system-ui, sans-serif;
      font-weight: 800;
    }

    /* ── Header ── */
    .header {
      height: var(--header-h);
      background: var(--black);
      color: var(--white);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 36px 52px;
      flex-shrink: 0;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 32px;
      min-width: 0;
    }

    .header-brand img {
      width: 140px;
      height: 140px;
      object-fit: contain;
      flex-shrink: 0;
      filter: brightness(0) invert(1);
    }

    .header-brand-text {
      font-family: 'Roboto Condensed', sans-serif;
      font-size: 3.15rem;
      font-weight: 900;
      letter-spacing: 0.05em;
      line-height: 1.1;
      text-transform: uppercase;
    }

    .header-title {
      font-family: 'Roboto Condensed', sans-serif;
      font-size: 3.05rem;
      font-weight: 900;
      letter-spacing: 0.04em;
      line-height: 1.14;
      text-align: right;
      text-transform: uppercase;
      max-width: 480px;
    }

    /* ── Main ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      padding: 0 52px;
    }

    .section-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 48px 0 36px;
      border-bottom: 4px solid var(--black);
      flex-shrink: 0;
    }

    .section-head h2 {
      font-family: 'Roboto Condensed', sans-serif;
      font-size: 3.75rem;
      font-weight: 900;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .clock {
      font-family: 'Roboto Condensed', sans-serif;
      font-size: 3.75rem;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.02em;
    }

    .arrivals {
      list-style: none;
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
      position: relative;
    }

    .arrival-row {
      display: grid;
      grid-template-columns: 176px 80px 1fr auto;
      align-items: center;
      gap: 28px;
      padding: 0 8px;
      border-bottom: 3px solid var(--black);
      flex: 1;
      min-height: 0;
      transition: background 0.35s ease, opacity 0.4s ease;
      overflow: visible;
    }

    .arrival-row.active {
      background: #f0f0f0;
    }

    .arrival-row.arrived {
      background: #e6e6e6;
    }

    .arrival-row.gone {
      opacity: 0.35;
    }

    .arrival-row.exiting {
      opacity: 0;
      transform: translateY(110%);
      transition:
        transform 0.55s cubic-bezier(0.55, 0, 1, 0.45),
        opacity 0.45s ease,
        background 0.35s ease;
    }

    .line-badge {
      background: var(--black);
      color: var(--white);
      font-family: 'Roboto Condensed', sans-serif;
      font-size: 3rem;
      font-weight: 900;
      letter-spacing: 0.02em;
      padding: 26px 16px;
      border-radius: 20px;
      text-align: center;
      line-height: 1;
      min-width: 176px;
    }

    .bus-icon {
      width: 80px;
      height: 80px;
      flex-shrink: 0;
      background: url('front-of-bus.png') center / 72px 72px no-repeat;
      transform: translateZ(0);
    }

    .dest {
      font-family: 'Roboto Condensed', sans-serif;
      font-size: 3rem;
      font-weight: 900;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      line-height: 1.12;
      padding-right: 16px;
    }

    .eta-wrap {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-shrink: 0;
    }

    .eta {
      font-family: 'Roboto Condensed', sans-serif;
      font-size: 3.5rem;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.02em;
      min-width: 130px;
      text-align: right;
      display: inline-block;
    }

    .eta.arrived {
      font-size: 2.85rem;
      font-weight: 900;
      letter-spacing: 0.04em;
    }

    .eta.tick {
      animation: eta-tick 0.42s ease;
    }

    @keyframes eta-tick {
      0% { transform: scale(1); opacity: 1; }
      35% { transform: scale(0.88); opacity: 0.3; }
      100% { transform: scale(1); opacity: 1; }
    }

    .signal-icon {
      width: 52px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .signal-icon svg {
      width: 48px;
      height: 48px;
      stroke: var(--black);
      fill: none;
      stroke-width: 3.5;
      stroke-linecap: round;
    }

    /* ── Footer ── */
    .footer {
      height: var(--footer-h);
      flex-shrink: 0;
      padding: 36px 52px 48px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: 28px;
    }

    .footer-title {
      font-family: 'Roboto Condensed', sans-serif;
      font-size: 3.4rem;
      font-weight: 900;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .footer-rule {
      height: 12px;
      background: var(--black);
      border-radius: 1px;
    }

    .stop-info {
      display: flex;
      align-items: center;
      gap: 24px;
      padding-top: 12px;
    }

    .pin-icon svg {
      width: 56px;
      height: 56px;
      fill: var(--black);
    }

    .stop-name {
      font-family: 'Roboto Condensed', sans-serif;
      font-size: 2.85rem;
      font-weight: 900;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>
  <div class="viewport" id="viewport">
    <div class="screen" id="screen">
      <header class="header">
        <div class="header-brand">
          <img src="ibb-amblem.png" alt="İBB">
          <div class="header-brand-text">İstanbul<br>Büyükşehir<br>Belediyesi</div>
        </div>
        <div class="header-title">Akıllı Durak<br>Bilgilendirme<br>Sistemi</div>
      </header>

      <main class="main">
        <div class="section-head">
          <h2>Sonraki Seferler</h2>
          <time class="clock" id="clock">14:35</time>
        </div>
        <ul class="arrivals" id="arrivals"></ul>
      </main>

      <footer class="footer">
        <div class="footer-title">Durak Bilgileri</div>
        <div class="footer-rule"></div>
        <div class="stop-info">
          <span class="pin-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 1 1 0-5 2.5 2.5 0 0 1 0 5z"/></svg>
          </span>
          <span class="stop-name">Merkez Meydan Durağı</span>
        </div>
      </footer>
    </div>
  </div>

  <script>
    const LINE_DEFS = [
      { line: '34AS', dest: 'Avcılar Metrobüs' },
      { line: '146T', dest: 'Taksim' },
      { line: '760', dest: 'Otogar' },
      { line: '500T', dest: 'Cevizlibağ — Tuzla Şifa Mah.' },
      { line: '28', dest: 'Beşiktaş' },
    ];

    const START_MINUTES = [3, 7, 12, 18, 22];
    const ARRIVED_MS = 3200;
    const EXIT_MS = 550;
    const REORDER_MS = 520;
    const RESET_MIN = 20;
    const START_HOUR = 14;
    const START_MINUTE = 35;

    let buses = [];
    let rowById = new Map();
    let animating = false;
    let lastOrderKey = '';
    let extraMinutes = 0;

    const arrivalsEl = document.getElementById('arrivals');
    const clockEl = document.getElementById('clock');
    const screenEl = document.getElementById('screen');

    const signalSvg = `<svg viewBox="0 0 24 24"><path d="M4.5 16.5c1.5-3 4.5-5 7.5-5s6 2 7.5 5"/><path d="M7.5 13.5c1-2 2.8-3.2 4.5-3.2s3.5 1.2 4.5 3.2"/><path d="M10.5 10.5a2.2 2.2 0 0 1 3 0"/></svg>`;

    const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

    function fit() {
      const s = Math.min(window.innerWidth / 1080, window.innerHeight / 1920, 1);
      screenEl.style.transform = `scale(${s})`;
    }

    function formatClock() {
      const total = START_MINUTE + extraMinutes;
      const h = START_HOUR + Math.floor(total / 60);
      const m = total % 60;
      return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
    }

    function slowDriftMs(minutes) {
      return 5000 + minutes * 900;
    }

    function fastTickMs(minutes) {
      return Math.max(550, 320 + minutes * 75);
    }

    function initBuses() {
      const now = Date.now();
      buses = LINE_DEFS.map((def, i) => ({
        id: i,
        line: def.line,
        dest: def.dest,
        minutes: START_MINUTES[i],
        phase: 'idle',
        nextDriftAt: now + slowDriftMs(START_MINUTES[i]) + i * 500,
      }));
    }

    function scheduleDrift(bus) {
      bus.nextDriftAt = Date.now() + slowDriftMs(bus.minutes);
    }

    function sortRank(b) {
      if (b.phase === 'active') return -1000;
      if (b.phase === 'arrived') return -500;
      if (b.phase === 'gone') return 8000;
      return b.minutes;
    }

    function sortBuses() {
      buses.sort((a, b) => sortRank(a) - sortRank(b));
    }

    function etaLabel(b) {
      if (b.phase === 'arrived') return 'geldi';
      if (b.phase === 'gone') return '—';
      return `${b.minutes} dk`;
    }

    function createRowEl(b) {
      const el = document.createElement('li');
      el.className = 'arrival-row';
      el.dataset.id = String(b.id);
      el.innerHTML = `
        <span class="line-badge">${b.line}</span>
        <span class="bus-icon" aria-hidden="true"></span>
        <span class="dest">${b.dest}</span>
        <span class="eta-wrap">
          <span class="eta">${etaLabel(b)}</span>
          <span class="signal-icon" aria-hidden="true">${signalSvg}</span>
        </span>
      `;
      return el;
    }

    function setRowPhase(el, phase) {
      el.classList.remove('active', 'arrived', 'gone', 'exiting');
      if (phase && phase !== 'idle') el.classList.add(phase);
    }

    function updateEta(el, b, animate = false) {
      const eta = el.querySelector('.eta');
      const label = etaLabel(b);
      if (eta.textContent !== label) eta.textContent = label;
      eta.classList.toggle('arrived', b.phase === 'arrived');
      if (animate) {
        eta.classList.remove('tick');
        void eta.offsetWidth;
        eta.classList.add('tick');
      }
    }

    function updateRowEl(el, b) {
      if (!el) return;
      setRowPhase(el, b.phase);
      updateEta(el, b);
    }

    function orderKey() {
      return buses.map((b) => `${b.id}:${b.phase}:${b.minutes}`).join('|');
    }

    function reorderDom() {
      buses.forEach((b) => {
        const el = rowById.get(b.id);
        if (el) arrivalsEl.appendChild(el);
      });
    }

    function clearRowMotion(el) {
      el.style.transition = '';
      el.style.transform = '';
    }

    function playReorderFlip() {
      const items = [...arrivalsEl.children];
      const firstRects = new Map(
        items.map((el) => [el.dataset.id, el.getBoundingClientRect()])
      );
      reorderDom();
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          items.forEach((el) => {
            clearRowMotion(el);
            const first = firstRects.get(el.dataset.id);
            if (!first) return;
            const last = el.getBoundingClientRect();
            const deltaY = first.top - last.top;
            if (Math.abs(deltaY) < 2) return;
            el.style.transition = 'transform 0s';
            el.style.transform = `translate3d(0, ${deltaY}px, 0)`;
          });
          requestAnimationFrame(() => {
            items.forEach((el) => {
              el.style.transition = `transform ${REORDER_MS}ms cubic-bezier(0.22, 1, 0.36, 1)`;
              el.style.transform = 'translate3d(0, 0, 0)';
            });
            setTimeout(() => {
              items.forEach(clearRowMotion);
            }, REORDER_MS + 40);
          });
        });
      });
    }

    function mountRows() {
      buses.forEach((b) => {
        const el = createRowEl(b);
        rowById.set(b.id, el);
        arrivalsEl.appendChild(el);
      });
    }

    function render(options = {}) {
      if (animating && !options.force) return;
      sortBuses();
      const key = orderKey();
      const orderChanged = key !== lastOrderKey;
      buses.forEach((b) => updateRowEl(rowById.get(b.id), b));
      if (orderChanged) {
        lastOrderKey = key;
        if (options.animateReorder) playReorderFlip();
        else reorderDom();
      }
    }

    function tickBackgroundDrift() {
      const now = Date.now();
      let changed = false;
      buses.forEach((b) => {
        if (b.phase !== 'idle' || b.minutes <= 1) return;
        if (now < b.nextDriftAt) return;
        b.minutes -= 1;
        scheduleDrift(b);
        const row = rowById.get(b.id);
        updateEta(row, b, true);
        changed = true;
      });
      if (changed && !animating) render({ animateReorder: true });
    }

    function pickNextBus() {
      const idle = buses.filter((b) => b.phase === 'idle');
      if (!idle.length) return null;
      return idle.reduce((a, b) => (b.minutes < a.minutes ? b : a));
    }

    async function animateBus(bus) {
      animating = true;
      bus.phase = 'active';
      bus.countdownFrom = bus.minutes;
      sortBuses();
      lastOrderKey = orderKey();
      reorderDom();

      const row = rowById.get(bus.id);
      setRowPhase(row, 'active');
      updateEta(row, bus);
      await sleep(120);

      while (bus.minutes >= 1) {
        const wait = fastTickMs(bus.minutes);
        await sleep(wait);
        if (bus.minutes > 1) {
          bus.minutes -= 1;
          updateEta(row, bus, true);
        } else break;
      }

      bus.phase = 'arrived';
      setRowPhase(row, 'arrived');
      updateEta(row, bus);
      await sleep(ARRIVED_MS);

      row.classList.add('exiting');
      await sleep(EXIT_MS);

      bus.phase = 'gone';
      setRowPhase(row, 'gone');
      updateEta(row, bus);
      row.classList.remove('exiting');
      clearRowMotion(row);
      await sleep(280);

      bus.phase = 'idle';
      bus.minutes = RESET_MIN + Math.floor(Math.random() * 8);
      scheduleDrift(bus);

      animating = false;
      lastOrderKey = '';
      sortBuses();
      buses.forEach((b) => updateRowEl(rowById.get(b.id), b));
      playReorderFlip();
      await sleep(REORDER_MS + 80);
    }

    async function runLoop() {
      while (true) {
        const next = pickNextBus();
        if (!next) {
          await sleep(300);
          continue;
        }
        await animateBus(next);
        await sleep(500);
      }
    }

    fit();
    window.addEventListener('resize', fit);
    initBuses();
    mountRows();
    sortBuses();
    reorderDom();
    lastOrderKey = orderKey();
    clockEl.textContent = formatClock();
    setInterval(tickBackgroundDrift, 800);
    setInterval(() => {
      extraMinutes += 1;
      clockEl.textContent = formatClock();
    }, 60000);
    runLoop();
  </script>
</body>
</html>
